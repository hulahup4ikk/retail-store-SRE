services:
  notification:
    build:
      context: .
    hostname: notification
    restart: always
    environment:
      - PORT=8080
      - NOTIFICATION_LOG_LEVEL=info
    ports:
      - "8086:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 10s
