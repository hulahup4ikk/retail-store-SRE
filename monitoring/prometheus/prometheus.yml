global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: node-exporter
    static_configs:
      - targets:
          - node-exporter:9100

  - job_name: cadvisor
    static_configs:
      - targets:
          - cadvisor:8080

  - job_name: ui
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8888

  - job_name: catalog
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:8081

  - job_name: cart
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8082

  - job_name: orders
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8083

  - job_name: checkout
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:8085

  - job_name: notification
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:8086
