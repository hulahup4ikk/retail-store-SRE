version: "3.9"

networks:
  frontend:
    driver: overlay
  backend:
    driver: overlay

volumes:
  catalog_db_data:
  orders_db_data:
  rabbitmq_data:

services:
  ui:
    image: public.ecr.aws/aws-containers/retail-store-sample-ui:1.5.0
    environment:
      SERVER_TOMCAT_ACCESSLOG_ENABLED: "true"
      JAVA_OPTS: -XX:MaxRAMPercentage=75.0 -Djava.security.egd=file:/dev/urandom
      RETAIL_UI_ENDPOINTS_CATALOG: http://catalog:8080
      RETAIL_UI_ENDPOINTS_CARTS: http://carts:8080
      RETAIL_UI_ENDPOINTS_CHECKOUT: http://checkout:8080
      RETAIL_UI_ENDPOINTS_ORDERS: http://orders:8080
    ports:
      - target: 8080
        published: 8888
        protocol: tcp
        mode: ingress
    networks:
      - frontend
      - backend
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure

  catalog:
    image: public.ecr.aws/aws-containers/retail-store-sample-catalog:1.5.0
    environment:
      GIN_MODE: release
      RETAIL_CATALOG_PERSISTENCE_PROVIDER: mysql
      RETAIL_CATALOG_PERSISTENCE_PASSWORD: ${DB_PASSWORD}
      RETAIL_CATALOG_PERSISTENCE_ENDPOINT: catalog-db:3306
    ports:
      - target: 8080
        published: 8081
        protocol: tcp
        mode: ingress
    networks:
      - backend
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure

  carts:
    image: public.ecr.aws/aws-containers/retail-store-sample-cart:1.5.0
    environment:
      SERVER_TOMCAT_ACCESSLOG_ENABLED: "true"
      RETAIL_CART_PERSISTENCE_PROVIDER: dynamodb
      RETAIL_CART_PERSISTENCE_DYNAMODB_ENDPOINT: http://carts-db:8000
      RETAIL_CART_PERSISTENCE_DYNAMODB_CREATE_TABLE: "true"
      AWS_ACCESS_KEY_ID: key
      AWS_SECRET_ACCESS_KEY: dummy
    ports:
      - target: 8080
        published: 8082
        protocol: tcp
        mode: ingress
    networks:
      - backend
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure

  orders:
    image: public.ecr.aws/aws-containers/retail-store-sample-orders:1.5.0
    environment:
      SERVER_TOMCAT_ACCESSLOG_ENABLED: "true"
      RETAIL_ORDERS_PERSISTENCE_PROVIDER: postgres
      RETAIL_ORDERS_PERSISTENCE_ENDPOINT: orders-db:5432
      RETAIL_ORDERS_PERSISTENCE_NAME: orders
      RETAIL_ORDERS_PERSISTENCE_USERNAME: orders_user
      RETAIL_ORDERS_PERSISTENCE_PASSWORD: ${DB_PASSWORD}
      RETAIL_ORDERS_MESSAGING_PROVIDER: rabbitmq
      RETAIL_ORDERS_MESSAGING_RABBITMQ_ADDRESSES: rabbitmq:5672
      RETAIL_ORDERS_MESSAGING_RABBITMQ_USERNAME: rabbitmq
      RETAIL_ORDERS_MESSAGING_RABBITMQ_PASSWORD: ${DB_PASSWORD}
    ports:
      - target: 8080
        published: 8083
        protocol: tcp
        mode: ingress
    networks:
      - backend
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure

  checkout:
    image: public.ecr.aws/aws-containers/retail-store-sample-checkout:1.5.0
    environment:
      RETAIL_CHECKOUT_PERSISTENCE_PROVIDER: redis
      RETAIL_CHECKOUT_PERSISTENCE_REDIS_URL: redis://checkout-redis:6379
      RETAIL_CHECKOUT_ENDPOINTS_ORDERS: http://orders:8080
    ports:
      - target: 8080
        published: 8085
        protocol: tcp
        mode: ingress
    networks:
      - backend
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure

  notification:
    image: ${NOTIFICATION_IMAGE:-retail-store-sample-notification:latest}
    environment:
      PORT: "8080"
      NOTIFICATION_LOG_LEVEL: info
    ports:
      - target: 8080
        published: 8086
        protocol: tcp
        mode: ingress
    networks:
      - backend
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure

  catalog-db:
    image: mariadb:10.9
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_ALLOW_EMPTY_PASSWORD: "true"
      MYSQL_DATABASE: catalogdb
      MYSQL_USER: catalog_user
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - catalog_db_data:/var/lib/mysql
    networks:
      - backend
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  carts-db:
    image: amazon/dynamodb-local:1.20.0
    networks:
      - backend
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  orders-db:
    image: postgres:16.1
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: orders
      POSTGRES_USER: orders_user
    volumes:
      - orders_db_data:/var/lib/postgresql/data
    networks:
      - backend
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  checkout-redis:
    image: redis:6.0-alpine
    networks:
      - backend
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: rabbitmq
      RABBITMQ_DEFAULT_PASS: ${DB_PASSWORD}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - backend
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
