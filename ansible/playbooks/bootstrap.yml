---
- name: Bootstrap Docker hosts
  hosts: swarm_manager:swarm_workers
  become: true
  tasks:
    - name: Install base packages on Debian hosts
      ansible.builtin.apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - docker.io
          - docker-compose-plugin
          - git
          - python3-pip
        state: present
        update_cache: true
      when: ansible_os_family == "Debian"

    - name: Install base packages on RedHat hosts
      ansible.builtin.dnf:
        name:
          - docker
          - docker-compose-plugin
          - git
          - python3-pip
        state: present
        update_cache: true
      when: ansible_os_family == "RedHat"

    - name: Ensure Docker service is running
      ansible.builtin.service:
        name: docker
        enabled: true
        state: started

    - name: Add remote user to docker group
      ansible.builtin.user:
        name: "{{ ansible_user }}"
        groups: docker
        append: true

    - name: Create project root
      ansible.builtin.file:
        path: "{{ project_root }}"
        state: directory
        mode: "0755"

    - name: Copy repository to remote host
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../"
        dest: "{{ project_root }}/"
        mode: preserve

- name: Bootstrap EKS deployment host
  hosts: localhost
  connection: local
  become: false
  tasks:
    - name: Print reminder for local prerequisites
      ansible.builtin.debug:
        msg:
          - "Install awscli, kubectl, helm, and helmfile on the control host."
          - "Authenticate AWS CLI before running the EKS deployment playbook."
